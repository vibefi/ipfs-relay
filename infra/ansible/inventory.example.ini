# Copy to inventory.ini and fill in real values (never commit inventory.ini)
#
# ansible-playbook -i inventory.ini playbook.yml

[relay]
ipfs-relay-prod ansible_host=<SERVER_IP>

[relay:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/vibefi_deploy
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new

# --- App config (written to /opt/ipfs-relay/infra/.env on the server) --------
vibefi_relay_pinata_jwt=
vibefi_relay_foureverland_token=
