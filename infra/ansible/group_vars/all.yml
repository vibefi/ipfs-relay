# Default variables — override per-host in inventory.ini or with -e flags

# Where the app lives on the server
app_dir: /opt/ipfs-relay

# Git repo to clone (update if you fork or use a deploy key)
app_repo: https://github.com/vibefi/ipfs-relay.git
app_branch: master

# Path to the GitHub Actions deploy keypair generated by setup.sh.
# The public key is added to authorized_keys on the server if present.
github_actions_key_dir: "{{ playbook_dir }}/.keys"
github_actions_key_path: "{{ github_actions_key_dir }}/github_actions_relay_ed25519"

# Server's public IP — used by Kubo to announce its swarm address.
# Defaults to the Ansible inventory host. Override if you have an elastic IP.
kubo_public_ip: "{{ ansible_host }}"

# Optional auth secret for Kubo API endpoints exposed via Caddy (CI use).
# Format: basic:<username>:<password>
kubo_api_auth_secret: ""

# System packages to install before Docker
base_packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - rsync
  - ufw
  - htop
  - vim
  - unattended-upgrades

# Firewall: ports to open (besides 22 which is always allowed)
firewall_allow_ports:
  - { port: "80",   proto: "tcp",      comment: "HTTP (Caddy redirect)" }
  - { port: "443",  proto: "tcp",      comment: "HTTPS" }
  - { port: "443",  proto: "udp",      comment: "HTTP/3 QUIC" }
  - { port: "4001", proto: "tcp",      comment: "IPFS swarm" }
  - { port: "4001", proto: "udp",      comment: "IPFS swarm QUIC" }
